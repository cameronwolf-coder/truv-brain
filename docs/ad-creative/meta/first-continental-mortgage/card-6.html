<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>First Continental Mortgage x Truv - Card 6</title>
<style>
  @font-face {
    font-family: 'Gilroy';
    src: url('../../branding/fonts/Gilroy-Medium.woff2') format('woff2');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Gilroy';
    src: url('../../branding/fonts/Gilroy-SemiBold.woff2') format('woff2');
    font-weight: 600; font-style: normal; font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden; margin: 0;
    font-family: 'Gilroy', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #050A18; position: relative;
  }

  .bg-ellipse-1 {
    position: absolute; top: 300px; left: 200px;
    width: 1200px; height: 1200px; pointer-events: none; opacity: 0.5;
  }
  .bg-ellipse-1 img { width: 100%; height: 100%; object-fit: contain; }

  .bg-ellipse-2 {
    position: absolute; top: -450px; left: -450px;
    width: 1000px; height: 900px; pointer-events: none; opacity: 0.7;
  }
  .bg-ellipse-2 img { width: 100%; height: 100%; object-fit: contain; }

  .top-bar {
    position: absolute; top: 0; left: 0; width: 1080px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 36px 48px; z-index: 5;
  }

  .logo { width: 80px; height: 28px; flex-shrink: 0; }
  .logo img { width: 100%; height: 100%; }

  .page-label {
    font-family: 'Gilroy', sans-serif; font-weight: 600; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .page-counter {
    font-family: 'Gilroy', sans-serif; font-weight: 500; font-size: 14px;
    color: rgba(255,255,255,0.3);
  }

  .doc-area {
    position: absolute; top: 90px; left: 50%;
    transform: translateX(-50%); width: 920px; height: 740px;
    z-index: 3; perspective: 1800px;
  }

  .doc-wrapper {
    width: 100%; height: 100%; position: relative;
    transform: rotateY(-3deg) rotateX(3deg); transform-style: preserve-3d;
  }

  .doc-page {
    width: 100%; height: 100%; border-radius: 8px; overflow: hidden;
    box-shadow: 0 50px 100px rgba(0,0,0,0.7), 0 20px 40px rgba(0,0,0,0.4),
      0 0 0 1px rgba(255,255,255,0.08);
    position: relative;
  }

  .doc-page img {
    width: 100%; height: 100%; object-fit: cover;
    object-position: top center; display: block;
  }

  .doc-page::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(130deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,0.05) 100%);
    pointer-events: none;
  }

  .cta-bar {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%); z-index: 10;
  }

  .cta-btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: #2C64E3; color: #FFFFFF;
    font-family: 'Gilroy', sans-serif; font-weight: 600; font-size: 20px;
    letter-spacing: 0.2px; padding: 18px 40px; border-radius: 50px;
    box-shadow: 0 10px 30px rgba(44,100,227,0.5);
  }

  .swipe-hint {
    position: absolute; bottom: 28px; right: 36px;
    display: flex; align-items: center; gap: 6px; z-index: 10;
  }
  .swipe-hint span {
    font-family: 'Gilroy', sans-serif; font-weight: 500; font-size: 13px;
    color: rgba(255,255,255,0.3); letter-spacing: 0.5px;
  }
  .swipe-arrow {
    width: 14px; height: 14px;
    border-right: 2px solid rgba(255,255,255,0.3);
    border-bottom: 2px solid rgba(255,255,255,0.3);
    transform: rotate(-45deg);
  }
</style>
</head>
<body>
  <div class="bg-ellipse-1"><img src="assets/ellipse-glow-1.svg" alt=""></div>
  <div class="bg-ellipse-2"><img src="assets/ellipse-glow-2.svg" alt=""></div>

  <div class="top-bar">
    <div class="logo"><img src="assets/truv-logo.svg" alt="truv"></div>
    <div class="page-label">Conclusion</div>
    <div class="page-counter">6 / 6</div>
  </div>

  <div class="doc-area">
    <div class="doc-wrapper">
      <div class="doc-page">
        <img src="pdf-pages/page-6.png" alt="Conclusion">
      </div>
    </div>
  </div>
  
  <div class="cta-bar">
    <div class="cta-btn">Download the Full Case Study</div>
  </div>
</body>
</html>
