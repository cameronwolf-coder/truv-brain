<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>First Continental Mortgage x Truv - Support</title>
<style>
  @font-face {
    font-family: 'Gilroy';
    src: url('../../branding/fonts/Gilroy-Medium.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Gilroy';
    src: url('../../branding/fonts/Gilroy-SemiBold.woff2') format('woff2');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 1200px;
    overflow: hidden;
    margin: 0;
    font-family: 'Gilroy', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000000;
    position: relative;
  }

  .bg-ellipse-1 {
    position: absolute;
    top: 360px;
    left: 201px;
    width: 1795px;
    height: 1909px;
    pointer-events: none;
  }
  .bg-ellipse-1 img { width: 100%; height: 100%; object-fit: contain; }

  .bg-ellipse-2 {
    position: absolute;
    top: -872px;
    left: -873px;
    width: 1745px;
    height: 1612px;
    pointer-events: none;
  }
  .bg-ellipse-2 img { width: 100%; height: 100%; object-fit: contain; }

  .phone-area {
    position: absolute;
    left: -369px;
    top: 372px;
    width: 2064px;
    height: 1386px;
    pointer-events: none;
  }

  .phone-full-layer {
    position: absolute;
    left: 0; top: 0;
    width: 2064px;
    height: 1386px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone-full-layer img {
    width: 1908px;
    height: 1073px;
    flex-shrink: 0;
    transform: rotate(-9.91deg);
  }

  .phone-fix {
    position: absolute;
    left: 689px; top: 174px;
    width: 712px; height: 1033px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone-fix img {
    width: 557px;
    height: 951px;
    flex-shrink: 0;
    transform: rotate(-9.91deg);
  }

  .phone-screen {
    position: absolute;
    left: 693px; top: 180px;
    width: 710px; height: 1016px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone-screen img {
    width: 558px;
    height: 934px;
    flex-shrink: 0;
    transform: rotate(-9.91deg);
  }

  .truv-badge {
    position: absolute;
    left: 284px;
    top: 852px;
    width: 226px;
    height: 226px;
  }
  .truv-badge img { width: 100%; height: 100%; object-fit: contain; }

  .top-content {
    position: absolute;
    top: 0;
    left: -1px;
    width: 1201px;
    height: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 64px;
    gap: 57px;
    z-index: 5;
  }

  .logo { width: 127px; height: 45px; flex-shrink: 0; }
  .logo img { width: 100%; height: 100%; }

  .headline {
    font-family: 'Gilroy', sans-serif;
    font-weight: 500;
    font-size: 85px;
    line-height: 88px;
    letter-spacing: -2.55px;
    text-align: center;
    width: 1071px;
    background-image: linear-gradient(-88.96deg, rgb(44, 100, 227) 2.32%, rgb(255, 255, 255) 82.73%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    flex-shrink: 0;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #2C64E3;
    color: #FFFFFF;
    font-family: 'Gilroy', sans-serif;
    font-weight: 500;
    font-size: 28px;
    letter-spacing: 0.28px;
    padding: 21px 28px;
    border-radius: 53px;
    text-decoration: none;
    width: 343.5px;
    height: 85.5px;
    flex-shrink: 0;
  }

  .partner-badge {
    position: absolute;
    left: 705px;
    top: 656px;
    width: 215px;
    height: 218px;
    border-radius: 62px;
    background: linear-gradient(43deg, rgb(0, 80, 143) 15%, rgb(10, 35, 75) 89%);
    box-shadow: 0 25px 38px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 4;
    padding: 30px;
  }
  .partner-badge img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }
</style>
</head>
<body>

  <div class="bg-ellipse-1">
    <img src="assets/ellipse-glow-1.svg" alt="">
  </div>
  <div class="bg-ellipse-2">
    <img src="assets/ellipse-glow-2.svg" alt="">
  </div>

  <div class="phone-area">
    <div class="phone-fix">
      <img src="assets/phone-fix.svg" alt="">
    </div>
    <div class="phone-full-layer">
      <img src="assets/phone-color.png" alt="">
    </div>
    <div class="phone-screen">
      <img src="assets/phone-screen-content.png" alt="">
    </div>
    <div class="phone-full-layer">
      <img src="assets/phone-frame.png" alt="">
    </div>
  </div>

  <div class="truv-badge">
    <img src="assets/truv-badge.svg" alt="">
  </div>

  <div class="partner-badge">
    <img src="assets/fcm-logo.png" alt="First Continental Mortgage">
  </div>

  <div class="top-content">
    <div class="logo">
      <img src="assets/truv-logo.svg" alt="truv">
    </div>
    <div class="headline">4-Hour Support Response, Not 2 Years</div>
    <a href="#" class="cta-btn">Read the Case Study</a>
  </div>

</body>
</html>
