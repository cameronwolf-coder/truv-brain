<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>First Continental Mortgage - Challenge Result - Card 4</title>
<style>
@font-face {
    font-family: 'Gilroy';
    src: url('../../../../branding/fonts/Gilroy-Medium.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
}
@font-face {
    font-family: 'Gilroy';
    src: url('../../../../branding/fonts/Gilroy-SemiBold.woff2') format('woff2');
    font-weight: 600;
    font-style: normal;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    margin: 0;
    font-family: 'Gilroy', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0F1C47 0%, #1a3a7a 100%);
    display: flex;
    flex-direction: column;
    position: relative;
}
.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 100px;
    text-align: center;
}
.label {
    font-size: 12px;
    font-weight: 600;
    color: #C5D9F7;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
}
.big-number {
    font-size: 44px;
    font-weight: 600;
    color: #FFFFFF;
    line-height: 1;
    margin-bottom: 40px;
}
.stats-row {
    display: flex;
    align-items: center;
    gap: 32px;
}
.stat-item {
    font-size: 16px;
    font-weight: 600;
    color: #C5D9F7;
    letter-spacing: 0.5px;
}
.stat-divider {
    width: 4px;
    height: 4px;
    background: rgba(197, 217, 247, 0.4);
    border-radius: 50%;
}
</style>
</head>
<body>
<div class="content">
    <div class="label">THE RESULTS</div>
    <div class="big-number">$745K saved</div>
    <div class="stats-row">
        <div class="stat-item">64% VOIE</div>
        <div class="stat-divider"></div>
        <div class="stat-item">85% VOA</div>
        <div class="stat-divider"></div>
        <div class="stat-item">8.21% R&W</div>
    </div>
</div>
</body>
</html>
